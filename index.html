<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Emilly Testa — Gerador de Contratos</title>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #ffe6f0;
    color: #333;
  }

  header {
    background: #ff66a3;
    color: white;
    padding: 25px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
  }

  .container {
    max-width: 800px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }

  h3 {
    margin-top: 20px;
    color: #ff3399;
  }

  select, input, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  textarea {
    min-height: 80px;
  }

  button {
    background: #ff3399;
    color: white;
    border: none;
    margin-top: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #e60073;
  }

  #resultado {
    white-space: pre-wrap;
    margin-top: 30px;
    padding: 20px;
    border: 1px solid #ffb3d9;
    background: #fff5fa;
    border-radius: 8px;
  }

  footer {
    text-align: center;
    margin: 40px 0 10px;
    font-size: 12px;
    color: #777;
  }
</style>
</head>

<body>

<header>
  Emilly Testa — Gerador de Contratos Jurídicos
</header>

<div class="container">

  <h3>Área do Direito</h3>
  <select id="area">
    <option>Direito de Família</option>
    <option>Direito Trabalhista</option>
    <option>Direito Civil</option>
  </select>

  <h3>Informações das Partes</h3>
  <input id="contratante" placeholder="Nome do contratante" />
  <input id="doc1" placeholder="CPF/CNPJ do contratante" />
  <input id="parte2" placeholder="Nome da outra parte" />
  <input id="doc2" placeholder="CPF/CNPJ da outra parte" />
  <input id="endereco" placeholder="Endereço das partes" />

  <h3>Detalhes do Acordo</h3>
  <textarea id="descricao" placeholder="Descreva a situação/acordo"></textarea>
  <input id="valor" placeholder="Valor envolvido (se houver)" />
  <input id="data" type="date" />

  <button onclick="gerarContrato()">Gerar Contrato</button>

  <div id="resultado"></div>
</div>

<footer>
  Modelo base. Revisar antes de utilizar juridicamente.
</footer>

<script>
function coletarDados() {
  return {
    area: document.getElementById("area").value,
    contratante: document.getElementById("contratante").value,
    doc1: document.getElementById("doc1").value,
    parte2: document.getElementById("parte2").value,
    doc2: document.getElementById("doc2").value,
    endereco: document.getElementById("endereco").value,
    descricao: document.getElementById("descricao").value,
    valor: document.getElementById("valor").value,
    data: document.getElementById("data").value,
  };
}

function montarTextoContrato(d) {
  return `
CONTRATO JURÍDICO — ${d.area}

CONTRATANTE: ${d.contratante}
Documento: ${d.doc1}

PARTE CONTRÁRIA: ${d.parte2}
Documento: ${d.doc2}

Endereço informado: ${d.endereco}

DESCRIÇÃO DO ACORDO:
${d.descricao}

Valor envolvido: ${d.valor || "Não informado"}
Data do acordo: ${d.data}

As partes firmam o presente acordo, podendo ajustá-lo conforme as
necessidades específicas do caso.

_______________
Assinatura do Contratante

_______________
Assinatura da Outra Parte
`;
}

function gerarContrato() {
  const dados = coletarDados();
  const contrato = montarTextoContrato(dados);
  document.getElementById("resultado").innerText = contrato;
}
</script>

</body>
</html>
